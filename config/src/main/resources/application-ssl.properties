server.ssl.enabled=true
server.port=8443

# Keystore Configuration
server.ssl.key-store=classpath:certs/server-keystore.p12
server.ssl.key-store-password=${KEYSTORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=server

# TLS Protocol Configuration
server.ssl.enabled-protocols=TLSv1.3,TLSv1.2
server.ssl.ciphers=TLS_AES_256_GCM_SHA384,TLS_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256

# Mutual TLS (mTLS) Configuration - Uncomment to enable client authentication
# server.ssl.client-auth=need
# server.ssl.trust-store=classpath:certs/truststore.p12
# server.ssl.trust-store-password=${TRUSTSTORE_PASSWORD:changeit}
# server.ssl.trust-store-type=PKCS12

# Management endpoint SSL (if using Spring Boot Actuator)
management.server.ssl.enabled=true
management.server.ssl.key-store=${server.ssl.key-store}
management.server.ssl.key-store-password=${server.ssl.key-store-password}
management.server.ssl.key-store-type=${server.ssl.key-store-type}
